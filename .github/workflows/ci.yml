name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ci_dummy_token
      DATABASE_URL: file:./data/ci.db
      TZ: Europe/Kyiv
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run typecheck

      - run: npm run build
