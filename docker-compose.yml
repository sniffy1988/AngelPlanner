services:
  bot:
    image: ghcr.io/sniffy1988/angelplanner:latest
    build:
      context: .
      platforms:
        - linux/amd64
    env_file: .env
    environment:
      DATABASE_URL: "file:/app/data/angelplanner.db"
      TZ: Europe/Kyiv
    volumes:
      - angelplanner-data:/app/data
    restart: unless-stopped

  studio:
    image: ghcr.io/sniffy1988/angelplanner:latest
    build:
      context: .
      platforms:
        - linux/amd64
    depends_on:
      - bot
    environment:
      DATABASE_URL: "file:/app/data/angelplanner.db?connection_limit=1&socket_timeout=30"
      TZ: Europe/Kyiv
      BROWSER: none
    command: ["/app/scripts/start-studio.sh"]
    ports:
      - "0.0.0.0:6666:6666"
    volumes:
      - angelplanner-data:/app/data
    restart: unless-stopped

volumes:
  angelplanner-data:
