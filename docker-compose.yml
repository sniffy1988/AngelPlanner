services:
  bot:
    image: ghcr.io/sniffy1988/angelplanner:latest
    build:
      context: .
      platforms:
        - linux/amd64
    env_file: .env
    environment:
      DATABASE_URL: "file:/app/data/angelplanner.db"
      TZ: Europe/Kyiv
    volumes:
      - angelplanner-data:/app/data
    restart: unless-stopped

  studio:
    image: ghcr.io/sniffy1988/angelplanner:latest
    build:
      context: .
      platforms:
        - linux/amd64
    environment:
      DATABASE_URL: "file:/app/data/angelplanner.db"
      TZ: Europe/Kyiv
    command: ["sh", "-c", "npx prisma studio --port 6666 --hostname 0.0.0.0"]
    ports:
      - "6666:6666"
    volumes:
      - angelplanner-data:/app/data
    restart: unless-stopped

volumes:
  angelplanner-data:
