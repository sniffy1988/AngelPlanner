# Portainer Stack — вставьте в Stacks → Add stack → Web editor
# Переменные BOT_TOKEN задайте в разделе Environment variables стека
# Prisma Studio: http://<IP-сервера>:6666

services:
  bot:
    image: ghcr.io/sniffy1988/angelplanner:latest
    container_name: angelplanner-bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: file:/app/data/angelplanner.db?connection_limit=1&socket_timeout=30
      TZ: Europe/Kyiv
      DEFAULT_LOCALE: ua
    volumes:
      - angelplanner-data:/app/data

  studio:
    image: ghcr.io/sniffy1988/angelplanner:latest
    container_name: angelplanner-studio
    restart: unless-stopped
    depends_on:
      - bot
    command:
      - sh
      - -c
      - |
        export DATABASE_URL="file:/app/data/angelplanner.db?connection_limit=1&socket_timeout=30"
        export BROWSER=none
        echo "Waiting for database..."
        i=0
        while [ ! -f /app/data/angelplanner.db ] && [ "$$i" -lt 60 ]; do
          i=$$((i + 1))
          sleep 2
        done
        if [ ! -f /app/data/angelplanner.db ]; then
          mkdir -p /app/data
          npx prisma migrate deploy
        fi
        echo "Starting Prisma Studio on 0.0.0.0:6666"
        exec npx prisma studio --port 6666 --hostname 0.0.0.0 -b none
    environment:
      DATABASE_URL: file:/app/data/angelplanner.db?connection_limit=1&socket_timeout=30
      TZ: Europe/Kyiv
      BROWSER: none
    ports:
      - "0.0.0.0:6666:6666"
    volumes:
      - angelplanner-data:/app/data

volumes:
  angelplanner-data:
    name: angelplanner-data
