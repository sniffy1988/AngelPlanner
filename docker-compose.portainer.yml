services:
  bot:
    image: ghcr.io/sniffy1988/angelplanner:latest
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: file:/app/data/angelplanner.db
      TZ: Europe/Kyiv
      DEFAULT_LOCALE: ua
    volumes:
      - angelplanner-data:/app/data

  studio:
    image: ghcr.io/sniffy1988/angelplanner:latest
    restart: unless-stopped
    depends_on:
      - bot
    environment:
      DATABASE_URL: file:/app/data/angelplanner.db
      TZ: Europe/Kyiv
      BROWSER: none
    command:
      - sh
      - -c
      - sleep 30 && exec npx prisma studio -p 6666 -n 0.0.0.0 -b none
    ports:
      - "6666:6666"
    volumes:
      - angelplanner-data:/app/data

volumes:
  angelplanner-data:
