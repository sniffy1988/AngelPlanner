# Portainer Stack
# Prisma Studio: http://<IP-сервера>:6666
# BOT_TOKEN — в Environment variables стека
#
# Важно: при создании стека выберите "Docker Compose" (не Swarm),
# либо используйте ports mode: host ниже.

services:
  app:
    image: ghcr.io/sniffy1988/angelplanner:latest
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: file:/app/data/angelplanner.db
      TZ: Europe/Kyiv
      DEFAULT_LOCALE: ua
      BROWSER: none
    ports:
      - target: 6666
        published: 6666
        protocol: tcp
        mode: host
    volumes:
      - angelplanner-data:/app/data

volumes:
  angelplanner-data:
