# Portainer Stack (Docker Compose)
# Prisma Studio: http://<IP-сервера>:6666
# BOT_TOKEN — в Environment variables стека

services:
  app:
    image: ghcr.io/sniffy1988/angelplanner:latest
    container_name: angelplanner
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: file:/app/data/angelplanner.db
      TZ: Europe/Kyiv
      DEFAULT_LOCALE: ua
      BROWSER: none
    ports:
      - "6666:6666"
    volumes:
      - angelplanner-data:/app/data

volumes:
  angelplanner-data:
